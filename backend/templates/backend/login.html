<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - PRODRIVE Compliance</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Animated Particles Background */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Animated Gradient Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            z-index: -1;
            animation: floatOrb 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #2563eb, transparent);
            top: -200px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #7c3aed, transparent);
            bottom: -250px;
            left: -150px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #06b6d4, transparent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            33% {
                transform: translate(30px, -30px) scale(1.1);
                opacity: 0.5;
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
                opacity: 0.4;
            }
        }

        /* Login Container */
        .login-container {
            width: 100%;
            max-width: 480px;
            margin: 20px;
            z-index: 1;
            animation: containerFadeIn 0.8s ease-out;
        }

        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Login Card */
        .login-card {
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 52px 44px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 
                        0 0 0 1px rgba(37, 99, 235, 0.2),
                        0 0 40px rgba(37, 99, 235, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: cardGlow 3s ease-in-out infinite;
        }

        @keyframes cardGlow {
            0%, 100% {
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 
                            0 0 0 1px rgba(37, 99, 235, 0.2),
                            0 0 40px rgba(37, 99, 235, 0.1);
            }
            50% {
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 
                            0 0 0 1px rgba(37, 99, 235, 0.4),
                            0 0 60px rgba(37, 99, 235, 0.2);
            }
        }

        .login-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.9), 
                        0 0 0 1px rgba(37, 99, 235, 0.4),
                        0 0 80px rgba(37, 99, 235, 0.2);
        }

        /* Logo Section */
        .login-header {
            text-align: center;
            margin-bottom: 48px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            font-size: 52px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #2563eb, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
            margin-bottom: 12px;
            animation: logoPulse 2s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% {
                background: linear-gradient(135deg, #60a5fa, #2563eb, #3b82f6);
                -webkit-background-clip: text;
                background-clip: text;
            }
            50% {
                background: linear-gradient(135deg, #3b82f6, #60a5fa, #2563eb);
                -webkit-background-clip: text;
                background-clip: text;
            }
        }

        .login-subtitle {
            color: #9ca3af;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
        }

        .login-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.2), rgba(59, 130, 246, 0.1));
            border: 1px solid rgba(37, 99, 235, 0.3);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 11px;
            font-weight: 600;
            color: #60a5fa;
            margin-top: 16px;
            backdrop-filter: blur(5px);
            animation: badgeGlow 2s ease-in-out infinite;
        }

        @keyframes badgeGlow {
            0%, 100% {
                box-shadow: 0 0 5px rgba(37, 99, 235, 0.3);
                border-color: rgba(37, 99, 235, 0.3);
            }
            50% {
                box-shadow: 0 0 15px rgba(37, 99, 235, 0.5);
                border-color: rgba(37, 99, 235, 0.6);
            }
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 28px;
            animation: fadeInUp 0.5s ease-out;
            animation-fill-mode: both;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #e5e7eb;
            margin-bottom: 10px;
            display: block;
            transition: color 0.3s;
        }

        .form-label i {
            margin-right: 8px;
            font-size: 13px;
            color: #2563eb;
        }

        .input-wrapper {
            position: relative;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: rgba(26, 26, 26, 0.9);
            border: 1.5px solid #2a2a2a;
            border-radius: 16px;
            font-size: 14px;
            color: #ffffff !important;  /* WHITE TEXT */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: #2563eb;
            background: rgba(31, 31, 31, 0.95);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
            transform: scale(1.01);
            color: #ffffff !important;  /* WHITE TEXT on focus */
        }

        .form-control.error {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
            animation: shake 0.3s ease-in-out;
            color: #ffffff !important;  /* WHITE TEXT on error */
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .form-control::placeholder {
            color: #6b7280;  /* Gray placeholder text */
        }

        /* Autofill styles */
        .form-control:-webkit-autofill,
        .form-control:-webkit-autofill:hover,
        .form-control:-webkit-autofill:focus,
        .form-control:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #1a1a1a inset !important;
            -webkit-text-fill-color: #ffffff !important;
            caret-color: #ffffff !important;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9ca3af;
            transition: all 0.3s;
            font-size: 18px;
        }

        .toggle-password:hover {
            color: #2563eb;
            transform: translateY(-50%) scale(1.1);
        }

        .error-message {
            font-size: 11px;
            color: #f87171;
            margin-top: 8px;
            display: none;
            align-items: center;
            gap: 6px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-message i {
            font-size: 12px;
        }

        .error-message.show {
            display: flex;
        }

        /* Checkbox and Forgot */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            animation: fadeInUp 0.5s ease-out 0.3s both;
        }

        .custom-checkbox {
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .custom-checkbox:hover {
            transform: translateX(2px);
        }

        .custom-checkbox input {
            display: none;
        }

        .checkmark {
            width: 18px;
            height: 18px;
            background: rgba(26, 26, 26, 0.9);
            border: 1.5px solid #2a2a2a;
            border-radius: 5px;
            margin-right: 10px;
            position: relative;
            transition: all 0.3s;
        }

        .custom-checkbox input:checked + .checkmark {
            background: #2563eb;
            border-color: #2563eb;
            animation: checkPop 0.2s ease-out;
        }

        @keyframes checkPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .custom-checkbox input:checked + .checkmark::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 11px;
            font-weight: bold;
        }

        .checkbox-label {
            font-size: 13px;
            color: #d1d5db;
        }

        .forgot-link {
            font-size: 13px;
            color: #60a5fa;
            text-decoration: none;
            transition: all 0.3s;
            position: relative;
        }

        .forgot-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: #60a5fa;
            transition: width 0.3s;
        }

        .forgot-link:hover::after {
            width: 100%;
        }

        .forgot-link:hover {
            color: #93c5fd;
        }

        /* Button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out 0.4s both;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-login:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -10px rgba(37, 99, 235, 0.5);
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Alert Messages */
        .alert {
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 28px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideInAlert 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            backdrop-filter: blur(10px);
        }

        @keyframes slideInAlert {
            from {
                opacity: 0;
                transform: translateX(-30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #6ee7b7;
        }

        .alert-info {
            background: rgba(37, 99, 235, 0.15);
            border: 1px solid rgba(37, 99, 235, 0.4);
            color: #93c5fd;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 36px;
            padding-top: 28px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeInUp 0.5s ease-out 0.5s both;
        }

        .login-footer p {
            font-size: 12px;
            color: #6b7280;
        }

        /* Loading Spinner */
        .spinner-border-sm {
            width: 14px;
            height: 14px;
            border-width: 2px;
        }

        /* Responsive */
        @media (max-width: 576px) {
            .login-card {
                padding: 36px 24px;
            }
            
            .login-logo {
                font-size: 38px;
            }
            
            .login-badge {
                font-size: 10px;
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>
<div class="animated-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">PRODRIVE</div>
            <div class="login-subtitle">SMS Builder</div>
            <div class="login-badge">
                <i class="bi bi-shield-lock-fill me-1"></i> Secure Admin Portal
            </div>
        </div>

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% else %}info{% endif %} alert-dismissible fade show" role="alert">
                    <i class="bi bi-{% if message.tags == 'error' %}exclamation-triangle-fill{% elif message.tags == 'success' %}check-circle-fill{% else %}info-circle-fill{% endif %} fs-6"></i>
                    <span>{{ message }}</span>
                    <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Close" style="filter: invert(1);"></button>
                </div>
            {% endfor %}
        {% endif %}

        <!-- Login Form -->
        <form method="POST" action="{% url 'admin_login' %}" onsubmit="return validateForm()">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">
                    <i class="bi bi-envelope-fill"></i> Email Address
                </label>
                <div class="input-wrapper">
                    <input type="email" 
                           class="form-control" 
                           id="email" 
                           name="email" 
                           placeholder="admin@prodrivecompliance.com"
                           autocomplete="email"
                           value="{{ request.POST.email }}">
                </div>
                <div class="error-message" id="emailError">
                    <i class="bi bi-exclamation-circle"></i>
                    <span>Please enter a valid email address.</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    <i class="bi bi-lock-fill"></i> Password
                </label>
                <div class="input-wrapper">
                    <input type="password" 
                           class="form-control" 
                           id="password" 
                           name="password" 
                           placeholder="Enter your password"
                           autocomplete="current-password">
                    <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
                </div>
                <div class="error-message" id="passwordError">
                    <i class="bi bi-exclamation-circle"></i>
                    <span>Password is required.</span>
                </div>
            </div>

            <div class="checkbox-wrapper">
                <label class="custom-checkbox">
                    <input type="checkbox" name="remember" id="remember">
                    <span class="checkmark"></span>
                    <span class="checkbox-label">Remember me</span>
                </label>
                <a href="{% url 'admin_forgot_password' %}" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span id="btnText">Sign In</span>
                <span id="btnLoader" style="display: none;">
                    <span class="spinner-border spinner-border-sm me-2"></span> Authenticating...
                </span>
            </button>

            <div class="login-footer">
                <p><i class="bi bi-c-circle me-1"></i> 2026 PRODRIVE Compliance. All rights reserved.</p>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Particle Animation
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    
    const particles = [];
    const particleCount = 80;
    
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.5;
            this.speedY = (Math.random() - 0.5) * 0.5;
            this.opacity = Math.random() * 0.5 + 0.2;
        }
        
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            
            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
        }
        
        draw() {
            ctx.fillStyle = `rgba(96, 165, 250, ${this.opacity})`;
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
    }
    
    function initParticles() {
        resizeCanvas();
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
    }
    
    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let particle of particles) {
            particle.update();
            particle.draw();
        }
        requestAnimationFrame(animateParticles);
    }
    
    window.addEventListener('resize', () => {
        resizeCanvas();
        particles.length = 0;
        initParticles();
    });
    
    initParticles();
    animateParticles();
    
    // Toggle password visibility
    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('password');
    
    togglePassword.addEventListener('click', function() {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
        this.style.transform = 'translateY(-50%) scale(1.1)';
        setTimeout(() => {
            this.style.transform = 'translateY(-50%) scale(1)';
        }, 200);
    });

    // Form validation
    function validateForm() {
        let isValid = true;
        const email = document.getElementById('email');
        const password = document.getElementById('password');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        
        // Email validation
        if (!email.value.trim()) {
            email.classList.add('error');
            emailError.classList.add('show');
            isValid = false;
        } else if (!emailRegex.test(email.value)) {
            email.classList.add('error');
            emailError.classList.add('show');
            isValid = false;
        } else {
            email.classList.remove('error');
            emailError.classList.remove('show');
        }
        
        // Password validation
        if (!password.value) {
            password.classList.add('error');
            passwordError.classList.add('show');
            isValid = false;
        } else {
            password.classList.remove('error');
            passwordError.classList.remove('show');
        }
        
        // Show loader with animation
        if (isValid) {
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            
            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline-block';
        }
        
        return isValid;
    }
    
    // Clear errors on input with smooth transition
    document.getElementById('email').addEventListener('input', function() {
        this.classList.remove('error');
        document.getElementById('emailError').classList.remove('show');
    });
    
    document.getElementById('password').addEventListener('input', function() {
        this.classList.remove('error');
        document.getElementById('passwordError').classList.remove('show');
    });
    
    // Add focus animations
    const inputs = document.querySelectorAll('.form-control');
    inputs.forEach(input => {
        input.addEventListener('focus', function() {
            this.parentElement.parentElement.classList.add('focused');
        });
        input.addEventListener('blur', function() {
            this.parentElement.parentElement.classList.remove('focused');
        });
    });
</script>
</body>
</html>
